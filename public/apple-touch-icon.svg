<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Social Media Downloader">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ec4899" />
      <stop offset="0.5" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="sheen" x1="90" y1="0" x2="90" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.26" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Full-bleed, opaque square: iOS applies its own rounded mask, and the glyph
       sits well inside the maskable safe zone for Android adaptive icons. -->
  <rect width="180" height="180" fill="url(#tile)" />
  <rect width="180" height="180" fill="url(#sheen)" />

  <!-- Download-into-tray glyph -->
  <g stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M90 48V104" />
    <path d="M62 82 90 110 118 82" />
    <path d="M53 132H127" />
  </g>
</svg>
